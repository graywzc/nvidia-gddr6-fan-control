name: Deploy Linux GPU Hosts

on:
  push:
    branches: [main]
    paths:
      - "fan_control.py"
      - "aipc_observer.py"
      - "install/install-linux.sh"
      - "systemd/nvidia-gddr6-fan-control.service"
      - ".github/workflows/deploy-linux.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # A deploy job pinned to an offline self-hosted runner would otherwise sit
  # queued for up to 24h waiting for that host to come back. Instead, ask the
  # API which runners are online and build the deploy matrix from only those —
  # offline hosts are silently skipped rather than left hanging.
  select-hosts:
    name: Select online hosts
    runs-on: ubuntu-latest
    permissions:
      # Listing repository runners requires the Administration read permission.
      # If org policy blocks granting it to GITHUB_TOKEN, swap GH_TOKEN below
      # for a PAT secret with `administration:read`.
      administration: read
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
      any: ${{ steps.pick.outputs.any }}
    steps:
      - name: Pick online hosts
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Candidate hosts this workflow can deploy to.
          candidates=(aipc aipc1)
          # Label names carried by every runner that is currently connected.
          online="$(gh api --paginate "repos/${REPO}/actions/runners" \
            --jq '.runners[] | select(.status=="online") | .labels[].name' \
            | sort -u)"

          selected=()
          for host in "${candidates[@]}"; do
            if grep -qxF "$host" <<<"$online"; then
              echo "✅ $host is online — will deploy"
              selected+=("$host")
            else
              echo "⏭️  $host is offline — skipping"
            fi
          done

          if [ ${#selected[@]} -eq 0 ]; then
            echo "No candidate hosts are online; nothing to deploy."
            echo "matrix={\"host\":[]}" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            hosts_json="$(printf '%s\n' "${selected[@]}" | jq -R . | jq -cs .)"
            echo "matrix={\"host\":${hosts_json}}" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy ${{ matrix.host }}
    needs: select-hosts
    if: needs.select-hosts.outputs.any == 'true'
    runs-on: [self-hosted, linux, "${{ matrix.host }}"]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select-hosts.outputs.matrix) }}

    concurrency:
      group: deploy-linux-${{ matrix.host }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Python tests
        run: python3 -m unittest discover -s tests

      - name: Install and restart service
        run: sudo ./install/install-linux.sh

      - name: Verify service is active
        run: |
          if ! sudo systemctl is-active --quiet nvidia-gddr6-fan-control.service; then
            sudo systemctl --no-pager status nvidia-gddr6-fan-control.service
            sudo journalctl -u nvidia-gddr6-fan-control.service -n 80 --no-pager
            exit 1
          fi
